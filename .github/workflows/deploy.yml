name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  PROJECT_ID: pramaan-sebi-24363
  REGION: asia-south1
  SERVICE: sbi-pulse

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run (from source)
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --allow-unauthenticated \
            --memory 512Mi \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --quiet

      - name: Smoke test
        run: |
          URL=$(gcloud run services describe "$SERVICE" --project "$PROJECT_ID" --region "$REGION" --format='value(status.url)')
          echo "Service URL: $URL"
          code=$(curl -s -o /dev/null -w "%{http_code}" "$URL/")
          [ "$code" = "200" ] && echo "✓ home $code" || { echo "✗ home $code"; exit 1; }
          ai=$(curl -s "$URL/api/pulse/start?id=meena" | grep -o '"ai":true' || true)
          [ -n "$ai" ] && echo "✓ AI reasoning live" || echo "⚠ AI fallback mode (check GEMINI_API_KEY)"
